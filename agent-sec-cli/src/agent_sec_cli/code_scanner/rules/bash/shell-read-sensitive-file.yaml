rule_id: shell-read-sensitive-file
cwe_id: CWE-200
desc_en: >-
  Reading sensitive system files that contain credentials,
  keys, or critical system configuration.
desc_zh: >-
  读取包含凭据、密钥或关键系统配置的敏感系统文件。
regex: '\b(cat|less|more|head|tail|cp|scp|rsync|tar)\b'
severity: warn
target_regexes_ref: sensitive_file_paths
